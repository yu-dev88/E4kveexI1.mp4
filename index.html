<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>She been cappin in them raps </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --primary-bg: #101014;
      --header-bg: #191a1f;
      --card-bg: #16171c;
      --border-color: #232329;
      --footer-bg: #18181e;
      --accent: #ffd900;
      --text-main: #fff;
      --text-footer: #ccc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: "Poppins", Arial, sans-serif;
      background: var(--primary-bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--header-bg);
      text-align: center;
      padding: 18px 12px 14px 12px;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 1.5px 6px rgba(0,0,0,0.15);
      border-bottom: 1px solid var(--border-color);
      color: var(--text-main);
      position: sticky;
      top: 0;
      z-index: 10;
      word-break: break-word;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 18px 8px 10px 8px;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    video {
      width: 80%;
      object-fit: contain;
      border-radius: 12px;
      background: #18181e;
      box-shadow: 0 2px 18px rgba(0,0,0,0.11);
      margin-bottom: 18px;
      outline: none;
      border: 1px solid var(--border-color);
      transition: box-shadow 0.2s;
    }

    .banner-ad {
      background: var(--card-bg);
      border: 1px solid #292a2f;
      border-radius: 10px;
      padding: 11px 10px 8px 10px;
      width: 100%;
      text-align: center;
      font-size: 1rem;
      margin-top: 1px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.09);
      margin-bottom: 1px;
    }

    .banner-ad a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 200;
      font-size: 1rem;
    }

    .banner-ad a:hover {
      text-decoration: underline;
    }

    footer {
      background: var(--footer-bg);
      text-align: center;
      padding: 11px 0 10px 0;
      font-size: 0.97rem;
      color: var(--text-footer);
      border-top: 1px solid var(--border-color);
      margin-top: auto;
      letter-spacing: 0.1px;
    }

    /* Pop-up overlay */
    #adPopup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(8px);
      overflow: auto; /* scroll jika konten lebih besar dari layar */
    }

    /* Kontainer utama pop-up, posisi relatif untuk banner absolute */
    .popup-main {
      position: relative;
      display: inline-block;
      max-width: 95vw;
      background: transparent;
    }

    /* Banner instruksi di atas iklan */
    .instruction-banner {
      position: absolute;
      top: -40px; /* muncul di atas popup-main */
      left: 50%;
      transform: translateX(-50%);
      background: #ff4444;
      color: white;
      font-weight: bold;
      font-size: 18px;
      padding: 8px 20px;
      border-radius: 40px;
      white-space: nowrap; /* teks memanjang */
      border: 2px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      pointer-events: none; /* klik tembus ke iklan */
      z-index: 20;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Pembungkus iklan dengan scroll jika konten terlalu besar */
    .ad-wrapper {
      background: white; /* latar iklan putih */
      border-radius: 8px;
      overflow: auto;
      max-width: 100%;
      max-height: 80vh; /* agar tidak melebihi layar */
      line-height: 0;
    }

    #popup-ad-container {
      display: block;
      background: transparent;
    }

    #popup-ad-container iframe,
    #popup-ad-container img,
    #popup-ad-container div {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .popup-footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      pointer-events: none;
      text-shadow: 1px 1px 2px black;
    }

    #container-f7fc0a99721bb4a327aa256bf1adf6b9 {
      display: none;
    }

    @media (max-width: 400px) {
      header {
        font-size: 1.09rem;
        padding: 14px 5px 10px 5px;
      }
      .container {
        padding: 14px 3vw 7px 3vw;
        max-width: 100vw;
      }
      video, .banner-ad {
        max-width: 100vw;
        border-radius: 8px;
      }
      .banner-ad {
        font-size: 0.97rem;
        padding: 8px 4px 6px 4px;
      }
      footer {
        font-size: 0.90rem;
        padding: 9px 0 8px 0;
      }
    }
  </style>
</head>

  </header>

  <div class="container">
    <!-- Video dengan ID agar bisa dikontrol -->
    <video id="myVideo" controls autoplay playsinline controlslist="nofullscreen nodownload noremoteplayback" disablepictureinpicture preload="metadata">
      <source src="https://cdn.videy.co/E4kveexI1.mp4" type="video/mp4">
      Browser Anda tidak mendukung pemutar video.
    </video>
  </div>

  <footer>
    © 2025 Blacked Streaming. All rights reserved.

  <!-- Pop-up iklan -->
  <div id="adPopup">
    <div class="popup-main">
      <div class="instruction-banner">🔴 CLICK THE IMAGE TO CONTINUE</div>
      <div class="ad-wrapper">
        <div id="popup-ad-container"></div>
      </div>

    <div class="popup-footer">AFTER CLICKING THE IMAGE, THE VIDEO WILL CONTINUE</div>
  </div>

  <script async="async" data-cfasync="false" src="https://archaicmsflip.com/5f4267b3a827c96d9795642548181b38/invoke.js"></script>

  <script>
    // Cegah masuk fullscreen lewat JavaScript
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
    });

    // Proteksi klik kanan dan F12
    (function () {
      document.addEventListener('contextmenu', function (e) {
        if (!e.target.closest('.allow-context, iframe')) {
          e.preventDefault();
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === "F12") e.preventDefault();
        if (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase())) e.preventDefault();
        if (e.ctrlKey && ["U","S"].includes(e.key.toUpperCase())) e.preventDefault();
      });
    })();

    // Pop-up logic
    (function() {
      const video = document.getElementById('myVideo');
      const popup = document.getElementById('adPopup');
      const popupAdContainer = document.getElementById('popup-ad-container');
      const originalContainer = document.getElementById('container-f7fc0a99721bb4a327aa256bf1adf6b9');
      let popupShown = false;

      // Pindahkan container iklan ke dalam popup
      if (originalContainer && popupAdContainer) {
        popupAdContainer.appendChild(originalContainer);
        originalContainer.style.display = 'block';
      }

      function showAdPopup() {
        if (popupShown) return;
        popupShown = true;
        popup.style.display = 'flex';
        video.pause();
      }

      function hideAdPopupAndContinue() {
        popup.style.display = 'none';
        video.play().catch(() => {});
      }

      // Klik di area iklan: hanya lanjutkan jika yang diklik adalah LINK
      popupAdContainer.addEventListener('click', function(e) {
        const link = e.target.closest('a');
        if (link) {
          // Biarkan tautan terbuka, lalu tutup pop-up setelah jeda
          setTimeout(() => {
            hideAdPopupAndContinue();
          }, 300);
        }
      });

      // Klik di luar pop-up (overlay hitam) tidak menutup, hanya efek getar
      popup.addEventListener('click', function(e) {
        if (e.target === popup) {
          popup.style.animation = 'none';
          popup.offsetHeight;
          popup.style.animation = null;
        }
      });

      // Pop-up muncul 5 detik setelah video diputar
      video.addEventListener('play', function() {
        if (!popupShown) {
          setTimeout(showAdPopup, 5000);
        }
      });

      // Jika video sudah play saat halaman dimuat
      if (video.readyState >= 2 && !video.paused) {
        setTimeout(showAdPopup, 5000);
      }
    })();
  </script>
